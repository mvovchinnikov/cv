# Profile
profile: |
    <b>Java</b>-разработчик с <b>11+ годами</b> коммерческого опыта. Специализируюсь на
    создании высококачественного и масштабируемого программного обеспечения с
    использованием современных архитектурных подходов. Имею значительный опыт
    с Java, экосистемой <b>Spring</b>, контейнеризацией (<b>Docker</b>, <b>Kubernetes</b>/OpenShift) и
    практиками DevOps. Также мой опыт включает <b>руководство командой</b>
    разработки, технический анализ бизнес-требований, планирование и
    декомпозицию задач, что позволило увеличить производительность команды на
    25% и ускорить выпуск функциональности. Обладаю системным мышлением,
    готовностью решать сложные задачи и постоянно улучшать качество кода,
    процессы разработки и взаимодействие в команде.
