# Profile
profile: |
  Разработчик с более чем 10-летним опытом. Владею языками программирования Java и Kotlin. 
  Могу выполнять задачи связанные с фронтендом. За всю карьеру поработал над широким спектром проектов, 
  от небольших приложений до крупных корпоративных систем и платформ. Мне нравится создавать высококачественное 
  программное обеспечение, отвечающее потребностям клиентов и конечных пользователей. Мои навыки включают проектирование 
  и реализацию сложных систем, оптимизацию производительности и сотрудничество с другими командами. 
  Занимаюсь разработкой архитектуры, анализом бизнес-требований и планированием разработки. 
  Более года руковожу разработкой в команде из 5 человек.

